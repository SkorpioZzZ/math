<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-contact.css">
    <script src="../script.js" defer></script>
    
    <title>Math Covering - Contact</title>
</head>
<body>
    <header class="header">
        <div class="logo">Math Covering</div>
        
        <nav class="menu">
            <a href="../index.html">Accueil</a>
            <a href="../services.html">Services</a>
            <a href="../math_cov/index.html">Projet</a>
            <a href="../Tarifs/tarif.html">Tarif</a>
            <a href="../contact/contact.html">Contact</a>
        </nav>

        <div class="search">
            <input type="text" placeholder="Rechecher">
        </div>
    </header>

    <section class="contact">
    <div class="contact-container">
        <h2>Demandez votre devis</h2>
        <p>Parlez-nous de votre projet, nous vous répondrons rapidement.</p>

        <form action="#" method="POST">
            <div class="input-group">
                <input type="text" name="nom" placeholder="Votre nom" required>
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder="Votre e-mail" required>
            </div>

            <div class="input-group">
                <input type="tel" name="telephone" placeholder="Votre téléphone">
            </div>

            <div class="input-group">
                <select name="service">
                    <option value="">Choisissez une prestation</option>
                    <option>Covering complet</option>
                    <option>Covering partiel</option>
                    <option>Déchromage</option>
                    <option>PPF</option>
                    <option>Vitres teintées</option>
                </select>
            </div>

            <div class="input-group">
                <textarea name="message" rows="6" placeholder="Décrivez votre projet..." required></textarea>
            </div>

            <button type="submit">Demander un devis</button>
        </form>
    </div>
</section>
</body>
</html>
